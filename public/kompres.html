<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CrypTitan — Compress</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tool.css" />
</head>
<body class="crt">
  <div class="scanlines"></div>
  <header class="win98-taskbar">
    <div class="start-btn"><span class="start-logo">▣</span> START</div>
    <div class="taskbar-title">C:\&gt; COMPRESS.EXE</div>
    <div class="taskbar-clock" id="clock">--:--</div>
  </header>

  <main class="desktop">
    <section class="retro-window">
      <div class="window-header">
        <span class="window-title">■ COMPRESS.EXE — GZIP File Packer</span>
        <div class="window-controls"><button class="wc">_</button><button class="wc">▢</button><button class="wc close">×</button></div>
      </div>
      <div class="window-body tool-body">
        <a href="../index.html" class="retro-btn back">[ ◀ BACK ]</a>
        <h1 class="tool-title">// COMPRESS A FILE</h1>
        <p class="tool-hint">&gt; Runs entirely in your browser (GZIP). Output file will be downloaded as <code>&lt;name&gt;.gz</code>.</p>

        <form id="cmpForm" class="tool-form">
          <label class="fld"><span>&gt; SELECT FILE</span><input type="file" id="cmpFile" required /></label>
          <button type="submit" class="retro-btn primary">▶ RUN COMPRESS</button>
        </form>

        <pre id="log" class="console-log">&gt; SYSTEM IDLE. AWAITING INPUT...</pre>

        <h2 class="tool-sub">// HISTORY LOG</h2>
        <div id="history" class="history-list"><em>&gt; No records yet.</em></div>
      </div>
    </section>
  </main>

  <script>
    (function tick(){const d=new Date(),p=n=>String(n).padStart(2,'0');const e=document.getElementById('clock');if(e)e.textContent=p(d.getHours())+':'+p(d.getMinutes());setTimeout(tick,15000)})();

    const log = document.getElementById('log');
    const histEl = document.getElementById('history');
    const write = (t) => { log.textContent += '\n' + t; log.scrollTop = log.scrollHeight; };
    const fmt = (n) => n < 1024 ? n+' B' : n < 1048576 ? (n/1024).toFixed(1)+' KB' : (n/1048576).toFixed(2)+' MB';

    const HIST_KEY = 'cryptitan-cmp-history';
    const loadHist = () => JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
    const saveHist = (h) => localStorage.setItem(HIST_KEY, JSON.stringify(h.slice(0,25)));
    const renderHist = () => {
      const h = loadHist();
      if (!h.length) { histEl.innerHTML = '<em>&gt; No records yet.</em>'; return; }
      histEl.innerHTML = h.map(x =>
        `<div class="hist-row"><span>▸ ${x.name} &nbsp; <small>${fmt(x.before)} → ${fmt(x.after)} (${x.ratio}%)</small></span></div>`
      ).join('');
    };
    renderHist();

    document.getElementById('cmpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = document.getElementById('cmpFile').files[0];
      if (!f) return;
      write('> Compressing ' + f.name + ' (' + fmt(f.size) + ')...');
      try {
        const cs = new CompressionStream('gzip');
        const stream = f.stream().pipeThrough(cs);
        const blob = await new Response(stream).blob();
        const ratio = Math.round((1 - blob.size / f.size) * 100);
        write('> DONE. ' + fmt(f.size) + ' → ' + fmt(blob.size) + ' (saved ' + ratio + '%)');
        // trigger download
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = f.name + '.gz';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        // history
        const h = loadHist();
        h.unshift({ name: f.name, before: f.size, after: blob.size, ratio });
        saveHist(h); renderHist();
      } catch (err) {
        write('! ERROR: ' + err.message);
      }
    });
  </script>
</body>
</html>
