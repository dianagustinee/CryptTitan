<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CrypTitan — Encrypt</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tool.css" />
</head>
<body class="crt">
  <div class="scanlines"></div>
  <header class="win98-taskbar">
    <div class="start-btn"><span class="start-logo">▣</span> START</div>
    <div class="taskbar-title">C:\&gt; ENCRYPT.EXE</div>
    <div class="taskbar-clock" id="clock">--:--</div>
  </header>

  <main class="desktop">
    <section class="retro-window">
      <div class="window-header">
        <span class="window-title">■ ENCRYPT.EXE — AES-256 File Locker</span>
        <div class="window-controls"><button class="wc">_</button><button class="wc">▢</button><button class="wc close">×</button></div>
      </div>
      <div class="window-body tool-body">
        <a href="../index.html" class="retro-btn back">[ ◀ BACK ]</a>
        <h1 class="tool-title">// ENCRYPT A FILE</h1>
        <p class="tool-hint">&gt; Choose a file, set a strong password, then hit ENCRYPT. Output filename will be prefixed <code>encrypted_</code>.</p>

        <form id="encForm" class="tool-form" enctype="multipart/form-data">
          <label class="fld">
            <span>&gt; SELECT FILE</span>
            <input type="file" name="file" required />
          </label>
          <label class="fld">
            <span>&gt; PASSWORD KEY</span>
            <input type="password" name="key" placeholder="********" required />
          </label>
          <button type="submit" class="retro-btn primary">▶ RUN ENCRYPT</button>
        </form>

        <pre id="log" class="console-log">&gt; SYSTEM IDLE. AWAITING INPUT...</pre>

        <h2 class="tool-sub">// HISTORY LOG</h2>
        <div id="history" class="history-list"><em>Loading history...</em></div>
      </div>
    </section>
  </main>

  <script>
    (function tick(){const d=new Date(),p=n=>String(n).padStart(2,'0');const e=document.getElementById('clock');if(e)e.textContent=p(d.getHours())+':'+p(d.getMinutes());setTimeout(tick,15000)})();

    const log = document.getElementById('log');
    const write = (t) => { log.textContent += '\n' + t; log.scrollTop = log.scrollHeight; };

    document.getElementById('encForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      write('> Uploading & encrypting...');
      try {
        const res = await fetch('/encrypt', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        write('> SUCCESS. Output: encrypted_' + data.filename);
        write('> Download: /download/encrypted/' + data.filename);
        loadHistory();
      } catch (err) {
        write('! ERROR: ' + err.message);
      }
    });

    async function loadHistory() {
      try {
        const r = await fetch('/logs/encrypted');
        const list = await r.json();
        const el = document.getElementById('history');
        if (!list.length) { el.innerHTML = '<em>&gt; No records yet.</em>'; return; }
        el.innerHTML = list.map(x =>
          `<div class="hist-row"><span>▸ ${x.filename}</span>
           <a class="retro-btn small" href="/download/encrypted/${encodeURIComponent(x.filename)}">DOWNLOAD</a></div>`
        ).join('');
      } catch { document.getElementById('history').innerHTML = '<em>&gt; Could not load history.</em>'; }
    }
    loadHistory();
  </script>
</body>
</html>
